name: "Build Unsigned iOS IPA"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate iOS Folder (Prebuild)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Surgical Podfile Patch
        run: |
          cd ios
          # Ensure xcodeproj gem is available for the script
          gem install xcodeproj
          cat <<-'EOF' > patch_script.rb
          require 'xcodeproj'
          path = 'Podfile'
          content = File.read(path)
          unless content.include?('deterministic_uuids')
            content = "install! 'cocoapods', :deterministic_uuids => false\n" + content
          end
          flags_code = <<-RUBY
          post_install do |installer|
          installer.pods_project.build_configurations.each do |config|
          config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
          config.build_settings['ENABLE_PREVIEWS'] = 'NO'
          end
          installer.pods_project.targets.each do |target|
          target.build_configurations.each do |config|
          config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
          config.build_settings.delete('SWIFT_VERSION')
          config.build_settings.delete('SWIFT_OPTIMIZATION_LEVEL')
          end
          end
          # This targets the actual Project file to disable the script phase
          main_project_path = installer.aggregate_targets.first.user_project_path
          project = Xcodeproj::Project.open(main_project_path)
          project.targets.each do |target|
          target.shell_script_build_phases.each do |phase|
          if phase.name =~ /Bundle React Native code/
          phase.shell_script = "echo 'Manual Bundle detected - skipping'"
          end
          end
          end
          project.save
          end
          RUBY
          content = content.gsub(/post_install do.*?end/m, '')
          File.write(path, content + "\n" + flags_code)
          EOF
          ruby patch_script.rb

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Manual JS Bundle Generation
        run: |
          # Clean and prep
          rm -rf ios/main.jsbundle
          # Install the 'glue' modules that Metro keeps crying about
          npm install @expo/metro-config @react-native/metro-config @tensorflow/tfjs @tensorflow/tfjs-react-native expo-file-system expo-image-picker --save-dev
          
          export NODE_BINARY=$(which node)
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios \
            --reset-cache

      - name: Build Unsigned Archive
        run: |
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -1)
          SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
          export NODE_BINARY=$(which node)
          
          xcodebuild archive \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath build/ProjectLighthouse.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -jobs 3 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            SKIP_BUNDLING=YES
      
      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          # Search more broadly for the .app file inside the archive
          APP_PATH=$(find build/ProjectLighthouse.xcarchive -name "*.app" | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app file found. The build likely failed."
            exit 1
          fi
          
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ProjectLighthouse.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectLighthouse-IPA
          path: build/ProjectLighthouse.ipa
