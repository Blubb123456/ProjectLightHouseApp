name: "Build Unsigned iOS IPA"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate iOS Folder (Prebuild)
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --clean --no-install

      - name: Surgical Podfile Patch
        run: |
          cd ios
          cat <<'EOF' > patch_script.rb
          path = 'Podfile'
          content = File.read(path)
          
          # 1. Fix the top line for Xcode 16 compatibility
          unless content.include?('deterministic_uuids')
            content = "install! 'cocoapods', :deterministic_uuids => false\n" + content
          end
          
          # 2. Define our Project Lighthouse build flags
          flags = <<-RUBY
          config.build_settings['SWIFT_VERSION'] = '5.0'
          config.build_settings['SWIFT_OPTIMIZATION_LEVEL'] = '-O'
          config.build_settings['SWIFT_COMPILATION_MODE'] = 'wholemodule'
          config.build_settings['ENABLE_PREVIEWS'] = 'NO'
          config.build_settings['CLANG_ENABLE_EXPLICIT_MODULES'] = 'NO'
          config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
          config.build_settings['CLANG_WARN_NULLABILITY_COMPLETENESS'] = 'NO'
          config.build_settings['ALWAYS_SEARCH_USER_PATHS'] = 'YES'
          config.build_settings['GCC_WARN_INHIBIT_ALL_WARNINGS'] = 'YES'
          config.build_settings['USE_HEADERMAP'] = 'YES'
          config.build_settings['DERIVED_FILE_DIR'] = '$(PROJECT_TEMP_DIR)/DerivedSources'
          RUBY
          
          # 3. Inject into the existing post_install block
          if content.include?('post_install do |installer|')
            content.sub!('post_install do |installer|', "post_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n#{flags}    end\n  end")
          else
            content << "\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n#{flags}    end\n  end\nend\n"
          end
          
          File.write(path, content)
          EOF
          ruby patch_script.rb
          

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Fix React Native Path for Xcode
        run: |
          mkdir -p ios/scripts
          ln -s $(pwd)/node_modules/react-native/scripts/xcode ios/scripts/xcode
          # Force the Node path so Hermes and TensorFlow can find it
          echo "export NODE_BINARY=$(which node)" > .xcode.env
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env
     
      - name: Build Unsigned Archive
        run: |
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -1)
          SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
          # Force the Node path for the build shell
          export NODE_BINARY=$(which node)
          
          xcodebuild archive \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath build/ProjectLighthouse.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            SKIP_INSTALL=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            OTHER_SWIFT_FLAGS="-Xfrontend -suppress-warnings" \
            SWIFT_COMPILATION_MODE=wholemodule
      
      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          # Search more broadly for the .app file inside the archive
          APP_PATH=$(find build/ProjectLighthouse.xcarchive -name "*.app" | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app file found. The build likely failed."
            exit 1
          fi
          
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ProjectLighthouse.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectLighthouse-IPA
          path: build/ProjectLighthouse.ipa
