name: "Build Unsigned iOS IPA"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate iOS Folder (Prebuild)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Write Optimized Podfile
        run: |
          cd ios
          cat <<'EOF' > Podfile
          require_relative '../node_modules/expo/scripts/autolinking'
          require_relative '../node_modules/react-native/scripts/react_native_pods'

          platform :ios, '15.1'
          install! 'cocoapods', :deterministic_uuids => false

          target 'ProjectLightHouseReactApp' do
            use_expo_modules!
            config = use_native_modules!

            use_react_native!(
              :path => config[:reactNativePath],
              :hermes_enabled => true,
              :fabric_enabled => false,
              :new_arch_enabled => false
            )

            post_install do |installer|
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
                  config.build_settings['GCC_PRECOMPILE_PREFIX_HEADER'] = 'NO'
                  config.build_settings['SWIFT_OPTIMIZATION_LEVEL'] = '-Onone'
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
                  config.build_settings['DEFINES_MODULE'] = 'YES'
                end
              end
              
              installer.aggregate_targets.each do |target|
                target.user_project.build_configurations.each do |config|
                  config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
                  config.build_settings['GCC_PRECOMPILE_PREFIX_HEADER'] = 'NO'
                  config.build_settings['SWIFT_OPTIMIZATION_LEVEL'] = '-Onone'
                end
                target.user_project.save
              end
            end
          end
          EOF
      
      
      
      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Deep Clean Build Graph (Python)
        shell: python3 {0}
        run: |
          import os, re

          def sanitize_pbxproj(file_path):
              with open(file_path, 'r') as f:
                  content = f.read()

              # 1. Identify all ShellScript GUIDs
              # This regex finds the unique 24-character hex ID for every ShellScript phase
              script_guids = re.findall(r'([A-F0-9]{24}) /\* (?:\[CP-User\]|\[Expo\]|Bundle React|Hermes|Check FBReactNativeSpec)', content)
              
              if not script_guids:
                  print(f"No problematic scripts found in {file_path}")
                  return

              print(f"Found {len(script_guids)} scripts to remove from {file_path}")

              # 2. Remove the GUIDs from the buildPhases list of every target
              for guid in script_guids:
                  # Remove the reference in the target buildPhases
                  content = re.sub(r'^\s+' + guid + r' /\* .*? \*/,\n', '', content, flags=re.MULTILINE)
                  # Remove the actual script definition block
                  content = re.sub(r'^\s+' + guid + r' /\* .*? \*/ = \{.*? \};\n', '', content, flags=re.DOTALL | re.MULTILINE)

              with open(file_path, 'w') as f:
                  f.write(content)

          # Apply this to the main app AND the Pods project
          for root, dirs, files in os.walk('ios'):
              for file in files:
                  if file == 'project.pbxproj':
                      sanitize_pbxproj(os.path.join(root, file))
     
      - name: Manual Module Map Emplacement
        run: |
          # The directory where Xcode 16.4 is looking for modules
          DEST="build/DerivedData/Build/Intermediates.noindex/ArchiveIntermediates/ProjectLightHouseReactApp/BuildProductsPath/Release-iphoneos"
          
          # Modules listed in your error log
          MODULES=("EXConstants" "Expo" "ExpoAsset" "ExpoFileSystem" "ExpoFont" "ExpoImagePicker" "ExpoKeepAwake" "ExpoModulesCore")

          for MOD in "${MODULES[@]}"; do
            echo "Searching for $MOD.modulemap..."
            # Find the actual modulemap file in the Pods directory
            MAP_PATH=$(find ios/Pods -name "$MOD.modulemap" | head -n 1)
            
            if [ -n "$MAP_PATH" ]; then
              mkdir -p "$DEST/$MOD"
              cp "$MAP_PATH" "$DEST/$MOD/"
              echo "✅ Placed $MOD.modulemap in $DEST/$MOD/"
            else
              echo "⚠️ Warning: $MOD.modulemap not found in ios/Pods"
            fi
          done
          
      - name: Build Unsigned Archive
        run: |
          xcodebuild archive \
            -workspace ios/ProjectLightHouseReactApp.xcworkspace \
            -scheme ProjectLightHouseReactApp \
            -configuration Release \
            -archivePath build/ProjectLighthouse.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            -parallelizeTargets=NO \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            GENERATE_INFOPLIST_FILE=YES \
            CLANG_ENABLE_MODULE_DEBUGGING=NO \
            VALIDATE_WORKSPACE=NO \
            INFOPLIST_ENABLE_EX_AUTO_LINK=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            GCC_PRECOMPILE_PREFIX_HEADER=NO \
            CLANG_ENABLE_MODULES=YES \
            HEADER_SEARCH_PATHS="$(PWD)/ios/Pods/Headers/Public/**" \
            SWIFT_COMPILATION_MODE=wholemodule \
            SWIFT_OPTIMIZATION_LEVEL="-Onone" \
            SKIP_INSTALL=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SKIP_BUNDLING=YES

      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build/ProjectLighthouse.xcarchive -name "*.app" | head -1)
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ProjectLighthouse.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectLighthouse-IPA
          path: build/ProjectLighthouse.ipa
