name: "Build Unsigned iOS IPA"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
      
      - name: Install TFJS React Native
        run: npx expo install @tensorflow/tfjs-react-native @tensorflow/tfjs expo-file-system
      
      - name: Generate iOS Folder (Prebuild)
        run: |
          rm -rf ios
          yes | npx expo prebuild --platform ios --template blank --no-install --non-interactive

      - name: Check Podfile Target
        run: grep "platform :ios" ios/Podfile
      
      - name: Update Pods
        run: cd ios && pod repo update   
      
      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Build Unsigned Archive
        env:
          ENTRY_FILE: App.js # Tell it to use App.js instead of index.js
        run: |
         WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -1)
          SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
          
          xcodebuild archive \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath build/ProjectLighthouse.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES 
            

      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          cp -r build/ProjectLighthouse.xcarchive/Products/Applications/*.app build/Payload/
          cd build
          zip -r ProjectLighthouse.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectLighthouse-IPA
          path: build/ProjectLighthouse.ipa
