name: "Build Unsigned iOS IPA"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate iOS Folder (Prebuild)
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --clean --no-install

      - name: Precise Podfile Patch
        run: |
          cd ios
          # 1. Create a brand new header with the UUID fix and a proper newline
          printf 'install! "cocoapods", :deterministic_uuids => false\n' > Podfile.new
          
          # 2. Append the rest of the original Podfile to the new header
          cat Podfile >> Podfile.new
          mv Podfile.new Podfile
          
          # 3. Append the Project Lighthouse overrides to the bottom
          echo "" >> Podfile
          echo "post_install do |installer|" >> Podfile
          echo "  installer.pods_project.targets.each do |target|" >> Podfile
          echo "    target.build_configurations.each do |config|" >> Podfile
          echo "      config.build_settings['SWIFT_VERSION'] = '5.0'" >> Podfile
          echo "      config.build_settings['CLANG_ENABLE_EXPLICIT_MODULES'] = 'NO'" >> Podfile
          echo "      config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'" >> Podfile
          echo "      config.build_settings['CLANG_WARN_NULLABILITY_COMPLETENESS'] = 'NO'" >> Podfile
          echo "      config.build_settings['ALWAYS_SEARCH_USER_PATHS'] = 'YES'" >> Podfile
          echo "      config.build_settings['GCC_WARN_INHIBIT_ALL_WARNINGS'] = 'YES'" >> Podfile
          echo "    end" >> Podfile
          echo "  end" >> Podfile
          echo "end" >> Podfile


      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Fix React Native Path for Xcode
        run: |
          mkdir -p ios/scripts
          ln -s $(pwd)/node_modules/react-native/scripts/xcode ios/scripts/xcode
          # Force the Node path so Hermes and TensorFlow can find it
          echo "export NODE_BINARY=$(which node)" > .xcode.env
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env
     
      - name: Build Unsigned Archive
        run: |
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -1)
          SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
          xcodebuild archive \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath build/ProjectLighthouse.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            SKIP_INSTALL=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CLANG_ENABLE_EXPLICIT_MODULES=NO \
            NODE_BINARY=$(which node) \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            HEADER_SEARCH_PATHS='$(inherited) "${PODS_ROOT}/Headers/Public/React-Core" "${PODS_ROOT}/Headers/Public/TensorFlowLiteC"' \
            OTHER_LDFLAGS='$(inherited) -Wl,-no_compact_unwind' \
            | tee build.log | grep -A 5 "error:" || true

      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build/ProjectLighthouse.xcarchive/Products/Applications -name "*.app" | head -1)
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ProjectLighthouse.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectLighthouse-IPA
          path: build/ProjectLighthouse.ipa
