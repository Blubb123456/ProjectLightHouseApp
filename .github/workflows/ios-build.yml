name: "Build Unsigned iOS IPA"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate iOS Folder (Prebuild)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Write Optimized Podfile
        run: |
          cd ios
          cat <<'EOF' > Podfile
          require_relative '../node_modules/expo/scripts/autolinking'
          require_relative '../node_modules/react-native/scripts/react_native_pods'

          platform :ios, '15.1'
          install! 'cocoapods', :deterministic_uuids => false

          target 'ProjectLightHouseReactApp' do
            use_expo_modules!
            config = use_native_modules!

            use_react_native!(
              :path => config[:reactNativePath],
              :hermes_enabled => true,
              :fabric_enabled => false,
              :new_arch_enabled => false
            )

            post_install do |installer|
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
                  config.build_settings['GCC_PRECOMPILE_PREFIX_HEADER'] = 'NO'
                  config.build_settings['SWIFT_OPTIMIZATION_LEVEL'] = '-Onone'
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
                  config.build_settings['DEFINES_MODULE'] = 'YES'
                end
              end
              
              installer.aggregate_targets.each do |target|
                target.user_project.build_configurations.each do |config|
                  config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
                  config.build_settings['GCC_PRECOMPILE_PREFIX_HEADER'] = 'NO'
                  config.build_settings['SWIFT_OPTIMIZATION_LEVEL'] = '-Onone'
                end
                target.user_project.save
              end
            end
          end
          EOF
      
      
      
      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Neutralize All Build Scripts
        run: |
          ruby -e "
          require 'find'
          Find.find('.') do |path|
            if path =~ /project\.pbxproj$/
              puts 'Neutralizing: ' + path
              content = File.read(path)
              # This regex finds every shellScript entry and forces it to exit 0
              content.gsub!(/shellScript = \".*?\";/m, 'shellScript = \"exit 0\";')
              File.open(path, 'w') { |f| f.write(content) }
            end
          end
          "
      - name: Safe Surgical Phase Removal
        run: |
          gem install xcodeproj
          ruby -e "
          require 'xcodeproj'
           Search all projects including Pods
          Dir.glob('**/*.xcodeproj').each do |path|
            puts 'Opening: ' + path
            project = Xcodeproj::Project.open(path)
            project.targets.each do |target|
              # Safely delete only the specific shell script phases causing the hang
              target.shell_script_build_phases.delete_if do |phase|
                if phase.name =~ /\[Expo\]|Bundle React|\[CP-User\]|Hermes/
                  puts '>>> Removed: ' + phase.name + ' from ' + target.name
                  true
                else
                  false
                end
              end
            end
            project.save
          end
          "  
     
          
      - name: Build Unsigned Archive
        run: |
          xcodebuild archive \
            -workspace ios/ProjectLightHouseReactApp.xcworkspace \
            -scheme ProjectLightHouseReactApp \
            -configuration Release \
            -archivePath build/ProjectLighthouse.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            -parallelizeTargets=NO \
            INFOPLIST_ENABLE_EX_AUTO_LINK=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            GCC_PRECOMPILE_PREFIX_HEADER=NO \
            SWIFT_COMPILATION_MODE=wholemodule \
            SWIFT_OPTIMIZATION_LEVEL="-Onone" \
            SKIP_INSTALL=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SKIP_BUNDLING=YES

      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build/ProjectLighthouse.xcarchive -name "*.app" | head -1)
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ProjectLighthouse.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectLighthouse-IPA
          path: build/ProjectLighthouse.ipa
