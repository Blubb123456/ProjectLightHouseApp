name: "Build Unsigned iOS IPA"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate iOS Folder (Prebuild)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Kill Xcode 16 Module Scanning
        run: |
          cd ios
          cat <<'EOF' > patch_podfile.rb
          path = 'Podfile'
          content = File.read(path)
          
          # Force the critical Project Lighthouse flags
          patch_code = <<-RUBY
          post_install do |installer|
          installer.pods_project.targets.each do |target|
          target.build_configurations.each do |config|
          config.build_settings['SWIFT_VERSION'] = '5.0'
          config.build_settings['CLANG_ENABLE_EXPLICIT_MODULES'] = 'NO'
          config.build_settings['CLANG_WARN_NULLABILITY_COMPLETENESS'] = 'NO'
          config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
          config.build_settings['OTHER_CPLUSPLUSFLAGS'] = ['$(inherited)', '-fno-aligned-allocation']
          end
          end
          end
          RUBY
          # Safely remove old blocks and write the new one
          content = content.gsub(/post_install do.*?end/m, '')
          File.open(path, "w") { |f| f.puts content + "\n" + patch_code }
          EOF
          ruby patch_podfile.rb


      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Build Unsigned Archive
        run: |
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -1)
          SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
          xcodebuild archive \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath build/ProjectLighthouse.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -quiet \
            SKIP_INSTALL=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CLANG_ENABLE_EXPLICIT_MODULES=NO

      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build/ProjectLighthouse.xcarchive/Products/Applications -name "*.app" | head -1)
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ProjectLighthouse.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectLighthouse-IPA
          path: build/ProjectLighthouse.ipa
