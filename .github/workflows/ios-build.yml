name: "Build Unsigned iOS IPA"

on:
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build:
    runs-on: macos-15 # Uses the latest macOS runner available in 2026
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Build Unsigned Archive
        run: |
          xcodebuild archive \
            -workspace ios/*.xcworkspace \
            -scheme ProjectLightHouseReactApp \
            -configuration Release \
            -archivePath build/UnsignedApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          cp -r build/UnsignedApp.xcarchive/Products/Applications/*.app build/Payload/
          cd build
          zip -r YourAppName.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/YourAppName.ipa
