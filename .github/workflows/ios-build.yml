name: "Build Unsigned iOS IPA"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate iOS Folder (Prebuild)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Patch Podfile and Disable Bundle Script
        run: |
          cd ios
          # 1. Global settings for Xcode 16 and skipping Metro
          cat <<-'EOF' > pod_patch.rb
          path = 'Podfile'
          content = File.read(path)
          
          # 1. Force the deterministic UUIDs fix for Xcode 16
          unless content.include?('deterministic_uuids')
            content = "install! 'cocoapods', :deterministic_uuids => false\n" + content
          end
          
          # 2. Define the new Enforcement Hook
          footer = <<-RUBY
          post_install do |installer|
          installer.pods_project.targets.each do |target|
          target.build_configurations.each do |config|
          # Force Deployment Target to stop range warnings
          config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
      
          # Kill the Swift Optimization Conflict (The 'Note' loop fix)
          config.build_settings.delete('SWIFT_OPTIMIZATION_LEVEL')
          config.build_settings.delete('SWIFT_VERSION')
      
          # Disable Sandboxing and Previews for CI
           config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
          config.build_settings['ENABLE_PREVIEWS'] = 'NO'
          end
          end
          end
          RUBY
          # 3. Wipe any existing post_install and append the fresh one
          content = content.gsub(/post_install do.*?end/m, '')
          File.write(path, content + "\n" + footer)
          EOF
          # Run the ruby script to actually modify the file
          ruby pod_patch.rb

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Surgical Build Phase Removal
        shell: python3 {0}
        run: |
          import os
          proj_path = next((os.path.join(root, 'project.pbxproj') for root, _, files in os.walk('ios') if root.endswith('.xcodeproj')), None)
          if proj_path:
              with open(proj_path, 'r') as f:
                  lines = f.readlines()
              with open(proj_path, 'w') as f:
                  skip = False
                  for line in lines:
                      if 'Bundle React Native code and images' in line and 'isa = PBXShellScriptBuildPhase' in line:
                          skip = True
                      if skip and '};' in line:
                          f.write('/* Nuked Phase */\n')
                          skip = False
                          continue
                      if not skip:
                          f.write(line)
              print("Successfully purged the bundle phase.")
      
      - name: Physically Delete Bundle Build Phase
        shell: python3 {0}
        run: |
          import os
          import re

          # 1. Locate the project file
          proj_path = None
          for root, dirs, files in os.walk('ios'):
              if root.endswith('.xcodeproj'):
                  proj_path = os.path.join(root, 'project.pbxproj')
                  break

          if not proj_path:
              print("Could not find xcodeproj file.")
              exit(1)

          print(f"Found project at {proj_path}")
          with open(proj_path, 'r') as f:
              content = f.read()

          # 2. Identify the 'Bundle React Native code and images' phase block
          # This regex finds the start of the phase and captures until the closing brace
          pattern = re.compile(r'/[*] Bundle React Native code and images [*]/ = \{.*?shellScript = ".*?";.*?\}', re.DOTALL)
          
          if pattern.search(content):
              new_content = re.sub(pattern, '/* Nuked Bundle Phase */ = { isa = PBXShellScriptBuildPhase; buildActionMask = 2147483647; files = (); name = "Bundle React Native code and images"; runOnlyForDeploymentPostprocessing = 0; shellPath = /bin/sh; shellScript = "echo skipping"; }', content)
              with open(proj_path, 'w') as f:
                  f.write(new_content)
              print("Successfully neutralized the Bundle Build Phase.")
          else:
              print("Bundle Phase not found or already removed.")
      
      - name: Hard-Disable Xcode Bundle Script
        run: |
          # This finds the 'Bundle React Native code' script inside the pbxproj 
          # and replaces the execution call with a no-op 'exit 0'
          find ios/*.xcodeproj/project.pbxproj -type f -exec sed -i '' 's/..\/node_modules\/react-native\/scripts\/react-native-xcode.sh/exit 0/g' {} +
      
      - name: Kill Xcode Bundle Script
        run: |
          # Target the specific shell script call inside the project file and neutralize it
          find ios/*.xcodeproj/project.pbxproj -type f -exec sed -i '' 's/..\/node_modules\/react-native\/scripts\/react-native-xcode.sh/echo "Skipping internal bundle"/g' {} +
      
      - name: Physically Delete Bundle Build Phase
        shell: python3 {0}
        run: |
          import os
          import re

          proj_path = None
          for root, dirs, files in os.walk('ios'):
              if root.endswith('.xcodeproj'):
                  proj_path = os.path.join(root, 'project.pbxproj')
                  break

          if proj_path:
              print(f"Found project at {proj_path}")
              with open(proj_path, 'r') as f:
                  content = f.read()

              # This regex identifies the entire 'Bundle React Native code and images' 
              # build phase block and replaces it with an empty string.
              pattern = re.compile(r'/[*][^*]*Bundle React Native code and images[*]/.*?;', re.DOTALL)
              new_content = re.sub(pattern, '', content)
              
              # Also kill the shell script content specifically just in case
              new_content = new_content.replace('react-native-xcode.sh', 'echo skipping')

              with open(proj_path, 'w') as f:
                  f.write(new_content)
              print("Successfully purged Bundle Build Phase.")
          else:
              print("Could not find xcodeproj file.")

      - name: Surgical Build Phase Purge
        shell: python3 {0}
        run: |
          import os
          import re

          proj_path = None
          for root, dirs, files in os.walk('ios'):
              if root.endswith('.xcodeproj'):
                  proj_path = os.path.join(root, 'project.pbxproj')
                  break

          if proj_path:
              with open(proj_path, 'r') as f:
                  content = f.read()

              # 1. Kill the Bundle Script execution and its dependencies
              # This regex wipes the script and the input/output paths that cause the 'target ended' hang
              content = re.sub(r'/[*] Bundle React Native code and images [*]/ = \{.*?shellScript = ".*?";.*?\}', 
                               '/* Nuked */ = { isa = PBXShellScriptBuildPhase; buildActionMask = 2147483647; files = (); name = "Bundle React Native code and images"; runOnlyForDeploymentPostprocessing = 0; shellPath = /bin/sh; shellScript = "exit 0"; }', 
                               content, flags=re.DOTALL)

              # 2. Kill the Hermes config script (another common Code 75 culprit)
              content = content.replace('react-native-xcode.sh', 'exit 0')
              content = content.replace('hermes-engine/destroot/bin/hermesc', 'exit 0')

              with open(proj_path, 'w') as f:
                  f.write(content)
              print("Project file sanitized.")
      
      - name: Manual JS Bundle Generation
        run: |
          # Install the specific modules the Metro graph needs to resolve
          npm install @expo/metro-config @react-native/metro-config @tensorflow/tfjs @tensorflow/tfjs-react-native expo-asset expo-file-system expo-constants expo-image-picker --save-dev
          
          rm -rf ios/main.jsbundle
          mkdir -p ios
          
          export NODE_BINARY=$(which node)
          
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios \
            --reset-cache

      - name: Build Unsigned Archive
        run: |
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -1)
          SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
          export SKIP_BUNDLING=1
          export NODE_BINARY=$(which node)
          
          xcodebuild archive \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath build/ProjectLighthouse.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -jobs 3 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            SKIP_BUNDLING=YES \
            FORCE_BUNDLING=NO \
            VFS_SKIP_ZIP_EXISTS_CHECK=YES \
            
            COMPILER_INDEX_STORE_ENABLE=NO \
            CLANG_ENABLE_MODULE_DEBUGGING=NO
      
      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          # Search more broadly for the .app file inside the archive
          APP_PATH=$(find build/ProjectLighthouse.xcarchive -name "*.app" | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app file found. The build likely failed."
            exit 1
          fi
          
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ProjectLighthouse.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectLighthouse-IPA
          path: build/ProjectLighthouse.ipa
