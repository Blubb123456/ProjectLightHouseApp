name: "Build Unsigned iOS IPA"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          rm -rf node_modules
          npm install
          npx expo install @tensorflow/tfjs-react-native @tensorflow/tfjs expo-file-system

      - name: Generate iOS Folder (Prebuild)
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --clean --no-install
      
      - name: Patch Podfile for TensorFlow
        run: |
          sed -i '' "s/config.build_settings\['GCC_PREPROCESSOR_DEFINITIONS'\] ||= \[/config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['IS_GPUTEST=1', /g" ios/Podfile
      
      - name: Update and Install Pods
        run: |
          cd ios
          pod repo update
          pod install
      
      - name: Clear Xcode Cache
        run: rm -rf ~/Library/Developer/Xcode/DerivedDat
      
      - name: Build Unsigned Archive
        env:
          ENTRY_FILE: App.js
        run: |
          # Use this in the Build Archive step
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -1)
          SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
          echo "Building Workspace: $WORKSPACE_PATH with Scheme: $SCHEME_NAME"
          
          xcodebuild archive \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath build/ProjectLighthouse.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -quiet \
            SWIFT_VERSION=5.0 \
            OTHER_SWIFT_FLAGS="-Xfrontend -suppress-warnings" \
            EXCLUDED_ARCHS="x86_64" \
            ENABLE_BITCODE=NO \
            SKIP_INSTALL=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CLANG_WARN_NULLABILITY_COMPLETENESS=NO \
            CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES=YES \
            OTHER_CFLAGS='$(inherited) -Wno-nullability-completeness' \
            OTHER_CPLUSPLUSFLAGS='$(inherited) -fno-aligned-allocation -Wno-nullability-completeness'

      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          # This finds the .app file regardless of its name
          # Use this in the Package into IPA step
          APP_PATH=$(find . -name "*.app" -path "*/Release-iphoneos/*" | head -1)
          echo "Found App at: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app file found in archive!"
            exit 1
          fi

          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ProjectLighthouse.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectLighthouse-IPA
          path: build/ProjectLighthouse.ipa
