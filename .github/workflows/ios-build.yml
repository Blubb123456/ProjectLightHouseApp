name: "Build Unsigned iOS IPA"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate iOS Folder (Prebuild)
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --clean --no-install

      - name: Surgical Podfile Patch
        run: |
          cd ios
          cat <<-'EOF' > patch_script.rb
          path = 'Podfile'
          content = File.read(path)
          
          # 1. Xcode 16.4 Header Fix
          unless content.include?('deterministic_uuids')
            content = "install! 'cocoapods', :deterministic_uuids => false\n" + content
          end
          
          # 2. Targeted Build Settings (The "Allow-List")
          flags_code = <<-RUBY
          post_install do |installer|
          installer.pods_project.targets.each do |target|
          target.build_configurations.each do |config|
          # ELIMINATE THE CODE 65: 
          # Only apply SWIFT_VERSION to non-core, non-engine pods.
          # We explicitly exclude hermes, React, and Expo.
          core_names = ['hermes', 'React', 'Expo', 'FBReactNativeSpec', 'RCT', 'DoubleConversion']
          is_core = core_names.any? { |core| target.name.include?(core) }
      
          if !is_core
          config.build_settings['SWIFT_VERSION'] = '5.0'
          end

          # Mandatory Xcode 16 CI Flags
          config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
          config.build_settings['CLANG_ENABLE_EXPLICIT_MODULES'] = 'NO'
          config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
          config.build_settings['GCC_WARN_INHIBIT_ALL_WARNINGS'] = 'YES'
          config.build_settings['SWIFT_COMPILATION_MODE'] = 'wholemodule'
          config.build_settings['ENABLE_PREVIEWS'] = 'NO'
          end
          end
          end
          RUBY
          # Wipe any existing post_install and replace with our clean version
          content = content.gsub(/post_install do.*?end/m, '')
          File.write(path, content + "\n" + flags_code)
          EOF
          ruby patch_script.rb
          

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Fix React Native Path for Xcode
        run: |
          mkdir -p ios/scripts
          ln -s $(pwd)/node_modules/react-native/scripts/xcode ios/scripts/xcode
          # Force the Node path so Hermes and TensorFlow can find it
          echo "export NODE_BINARY=$(which node)" > .xcode.env
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env
     
      - name: Build Unsigned Archive
        run: |
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -1)
          SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
          # Force the Node path for the build shell
          export NODE_BINARY=$(which node)
          
          xcodebuild archive \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath build/ProjectLighthouse.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            SKIP_INSTALL=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            OTHER_SWIFT_FLAGS="-Xfrontend -suppress-warnings" \
            SWIFT_COMPILATION_MODE=wholemodule
      
      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          # Search more broadly for the .app file inside the archive
          APP_PATH=$(find build/ProjectLighthouse.xcarchive -name "*.app" | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app file found. The build likely failed."
            exit 1
          fi
          
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ProjectLighthouse.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectLighthouse-IPA
          path: build/ProjectLighthouse.ipa
