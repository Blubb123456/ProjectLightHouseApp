name: "Build Unsigned iOS IPA"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate iOS Folder (Prebuild)
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --clean --no-install

      - name: Surgical Podfile Patch
        run: |
          cd ios
          ruby -e "
          path = 'Podfile'
          content = File.read(path)
          
          # 1. Fix the top line (Deterministic UUIDs)
          unless content.include?('deterministic_uuids')
            content.prepend(\"install! 'cocoapods', :deterministic_uuids => false\n\")
          end
          
          # 2. Inject our build flags into the EXISTING post_install block
          # This prevents the 'multiple post_install hooks' error
          flags = %q{
          config.build_settings['SWIFT_VERSION'] = '5.0'
          config.build_settings['CLANG_ENABLE_EXPLICIT_MODULES'] = 'NO'
          config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
          config.build_settings['CLANG_WARN_NULLABILITY_COMPLETENESS'] = 'NO'
          config.build_settings['ALWAYS_SEARCH_USER_PATHS'] = 'YES'
          config.build_settings['GCC_WARN_INHIBIT_ALL_WARNINGS'] = 'YES'
          }
          
          if content.include?('post_install do |installer|')
            content.sub!('post_install do |installer|', \"post_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n#{flags}    end\n  end\")
          else
            # Fallback if no post_install exists (unlikely with Expo)
            content += \"\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n#{flags}    end\n  end\nend\n\"
          end
          
          File.write(path, content)
          

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Fix React Native Path for Xcode
        run: |
          mkdir -p ios/scripts
          ln -s $(pwd)/node_modules/react-native/scripts/xcode ios/scripts/xcode
          # Force the Node path so Hermes and TensorFlow can find it
          echo "export NODE_BINARY=$(which node)" > .xcode.env
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env
     
      - name: Build Unsigned Archive
        run: |
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -1)
          SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
          xcodebuild archive \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath build/ProjectLighthouse.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            SKIP_INSTALL=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CLANG_ENABLE_EXPLICIT_MODULES=NO \
            NODE_BINARY=$(which node) \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            HEADER_SEARCH_PATHS='$(inherited) "${PODS_ROOT}/Headers/Public/React-Core" "${PODS_ROOT}/Headers/Public/TensorFlowLiteC"' \
            OTHER_LDFLAGS='$(inherited) -Wl,-no_compact_unwind' \
            | tee build.log | grep -A 5 "error:" || true

      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build/ProjectLighthouse.xcarchive/Products/Applications -name "*.app" | head -1)
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ProjectLighthouse.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectLighthouse-IPA
          path: build/ProjectLighthouse.ipa
