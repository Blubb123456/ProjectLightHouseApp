name: "Build Unsigned iOS IPA"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate iOS Folder (Prebuild)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Force Swift 5 and Disable Strict Checks
        run: |
          sed -i '' 's/use_react_native!(/post_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings["SWIFT_VERSION"] = "5.0"\n      config.build_settings["OTHER_SWIFT_FLAGS"] = "-Xfrontend -suppress-warnings"\n      config.build_settings["CLANG_WARN_NULLABILITY_COMPLETENESS"] = "NO"\n    end\n  end\nend\n\nuse_react_native!(/g' ios/Podfile
        
      - name: Patch Podfile for Compatibility
        run: |
          # This forces all pods to Swift 5 to stop the "InnerType" shadowing error
          echo "post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['SWIFT_VERSION'] = '5.0'
                config.build_settings['CLANG_WARN_NULLABILITY_COMPLETENESS'] = 'NO'
              end
            end
          end" >> ios/Podfile

      - name: Install Pods
        run: cd ios && pod install

      - name: Build Unsigned Archive
        run: |
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -1)
          SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
          
          xcodebuild archive \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath build/ProjectLighthouse.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -quiet \
            SKIP_INSTALL=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          # This finds the .app file regardless of its name
          # Use this in the Package into IPA step
          APP_PATH=$(find . -name "*.app" -path "*/Release-iphoneos/*" | head -1)
          echo "Found App at: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app file found in archive!"
            exit 1
          fi

          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ProjectLighthouse.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectLighthouse-IPA
          path: build/ProjectLighthouse.ipa
