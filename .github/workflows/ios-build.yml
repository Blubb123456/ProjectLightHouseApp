name: "Build Unsigned iOS IPA"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate iOS Folder (Prebuild)
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --clean --no-install

      - name: Surgical Podfile Patch
        run: |
          cd ios
          cat <<-'EOF' > patch_script.rb
          require 'xcodeproj'
          path = 'Podfile'
          content = File.read(path)
          
          # Force deterministic UUIDs off for Xcode 16
          unless content.include?('deterministic_uuids')
            content = "install! 'cocoapods', :deterministic_uuids => false\n" + content
          end
          
          flags_code = <<-RUBY
          post_install do |installer|
          # 1. Kill Sandboxing and Previews globally
          installer.pods_project.build_configurations.each do |config|
          config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
          config.build_settings['ENABLE_PREVIEWS'] = 'NO'
          config.build_settings['SKIP_BUNDLING'] = 'YES'
          end

          # 2. Strip Swift flags from ALL pods to stop the preview loop
          installer.pods_project.targets.each do |target|
          target.build_configurations.each do |config|
          config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.1'
          config.build_settings.delete('SWIFT_VERSION')
          config.build_settings.delete('SWIFT_OPTIMIZATION_LEVEL')
          end
          end

          # 3. THE NUKE: Find the main app project and empty the Bundle script
          # This prevents Code 65 by ensuring the script does literally nothing.
          main_project_path = installer.aggregate_targets.first.user_project_path
          project = Xcodeproj::Project.open(main_project_path)
          project.targets.each do |target|
          target.shell_script_build_phases.each do |phase|
          if phase.name =~ /Bundle React Native code/
          puts "Nuking Bundle Script for \#{target.name}"
          phase.shell_script = "echo 'Skipping Bundle phase - Manual Bundle detected'"
          end
          end
          end
          project.save
          end
          RUBY
          content = content.gsub(/post_install do.*?end/m, '')
          File.write(path, content + "\n" + flags_code)
          EOF
          ruby patch_script.rb
          

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Fix React Native Path for Xcode
        run: |
          mkdir -p ios/scripts
          ln -s $(pwd)/node_modules/react-native/scripts/xcode ios/scripts/xcode
          # Force the Node path so Hermes and TensorFlow can find it
          echo "export NODE_BINARY=$(which node)" > .xcode.env
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env

      - name: Fix React Native Bundle Path
        run: |
          mkdir -p ios/build
          ln -s $(which node) /usr/local/bin/node || true
          # Ensure entry file is visible to the shell script
          export ENTRY_FILE=index.js
      
      - name: Manual JS Bundle Generation
        run: |
          # 1. Install all missing core and expo dependencies for the bundler
          npm install @expo/metro-config @react-native/metro-config @tensorflow/tfjs @tensorflow/tfjs-react-native expo-file-system expo-image-picker expo-asset expo-constants --save-dev
          
          # 2. Fix the "server.tls" warning (Removes the deprecated flag from the temporary config)
          if [ -f metro.config.js ]; then
            sed -i '' 's/tls: false//g' metro.config.js || true
          fi

          # 3. Clean up and generate
          rm -rf ios/main.jsbundle
          mkdir -p ios
          
          export NODE_BINARY=$(which node)
          
          # 4. Generate the bundle with --reset-cache to ignore previous failures
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios \
            --reset-cache
      
      - name: Build Unsigned Archive
        run: |
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -1)
          SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
          # Force the Node path for the build shell
          export SKIP_BUNDLING=1
          export FORCE_BUNDLING=0
          export NODE_BINARY=$(which node)
          
          xcodebuild archive \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath build/ProjectLighthouse.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -jobs 3 \
            -derivedDataPath build/DerivedData \
            SKIP_INSTALL=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            VFS_SKIP_ZIP_EXISTS_CHECK=YES \
            OTHER_SWIFT_FLAGS="-DNDEBUG" \
            NODE_BINARY="$NODE_BINARY" \
            SKIP_BUNDLING=YES 
      
      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          # Search more broadly for the .app file inside the archive
          APP_PATH=$(find build/ProjectLighthouse.xcarchive -name "*.app" | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app file found. The build likely failed."
            exit 1
          fi
          
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ProjectLighthouse.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectLighthouse-IPA
          path: build/ProjectLighthouse.ipa
